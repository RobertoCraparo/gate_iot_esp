[platformio]
default_envs = nodemcuv2

[env]
; Impostazioni globali per architettura e framework
platform = espressif8266
framework = arduino

; Configurazione comunicazione seriale e porte
monitor_speed = 115200
upload_port = COM3
monitor_port = COM3
; Disabilitazione segnali di controllo per prevenire riavvii indesiderati
monitor_dtr = 0
monitor_rts = 0

; Elenco completo delle dipendenze del progetto
lib_deps =
; Modulo biometrico AS608
	adafruit/Adafruit Fingerprint Sensor Library @ ^2.1.0
; Controller SPI per lettore RFID
	miguelbalboa/MFRC522 @ ^1.4.11
; Interfaccia I2C per tastierino a matrice PCF8574
	robtillaart/I2CKeyPad
; Librerie grafiche per pannello OLED SSD1306
	adafruit/Adafruit GFX Library
	adafruit/Adafruit SSD1306

[env:nodemcuv2]
; Impostazioni specifiche per l'hardware target
board = nodemcuv2
upload_speed = 115200